<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartas em Estoque - Goblin Hero</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f5;
      margin: 0;
      padding: 20px;
      color: #1d1d1d;
    }

    h1 {
      text-align: center;
      color: #0f5132;
    }

    textarea {
      width: 100%;
      height: 260px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      background: #198754;
      color: white;
      border: none;
      padding: 12px 18px;
      margin: 10px 5px 10px 0;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #146c43;
    }

    .summary {
      background: #e9f7ef;
      border-radius: 10px;
      padding: 15px;
      margin: 15px 0;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      border-left: 6px solid #198754;
    }

    .status {
      font-weight: bold;
      color: #198754;
      margin-bottom: 6px;
    }

    .empty {
      background: #fff3cd;
      color: #856404;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      font-weight: bold;
    }

    a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Cartas em Estoque - Goblin Hero</h1>

  <p>Cole sua lista abaixo:</p>

  <textarea id="deckInput">Deck
1 Desolate Mire
1 Choked Estuary
1 Glacial Fortress
1 Shineshadow Snarl
1 Fetid Heath
1 Bojuka Bog
1 Contaminated Landscape
1 Arcane Sanctum
1 Skycloud Expanse
1 Restoration Magic
1 Sigil of Sleep
1 Sejiri Shelter
1 Baral, Chief of Compliance
1 Exsanguinate
1 Baleful Strix
1 Long River's Pull
1 Mai, Scornful Striker
1 Papalymo Totolymo
1 Narset's Reversal
1 Arcane Signet
1 Talisman of Dominance
1 Talisman of Hierarchy
1 Talisman of Progress
1 Steel of the Godhead
1 Absorb
1 Alisaie Leveilleur
1 Archmage's Charm
1 Bender's Waterskin
1 As Foretold
1 Disallow
1 Unwind
1 Survival Cache
1 Perplex
1 Eye of Nidhogg
1 G'raha Tia, Scion Reborn
1 Ghostly Prison
1 Propaganda
1 Timely Ward
1 Windfall
1 Vindicate
1 Alphinaud Leveilleur
1 Chameleon, Master of Disguise
1 Circle of Power
1 Dancer's Chakrams
1 Crushing Disappointment
1 Syphon Mind
1 Helm of the Ghastlord
1 Emet-Selch of the Third Seat
1 Y'shtola, Night's Blessed
1 Fandaniel, Telophoroi Ascian
1 Cleansing Nova
1 Starfall Invocation
1 Sublime Epiphany</textarea>

  <br>

  <button onclick="compararCartas()">Buscar somente com estoque</button>
  <button onclick="copiarEncontradas()">Copiar encontradas</button>
  <button onclick="limparResultado()">Limpar</button>

  <div id="summary"></div>
  <div id="results"></div>

  <script>
    const BASE_SITE = "https://www.goblinherostore.com.br/?view=ecom/itens&tcg=1";

    let cartasEncontradas = [];

    function normalizarTexto(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseDeck(texto) {
      return texto
        .split("\n")
        .map(linha => linha.trim())
        .filter(linha => linha && linha.toLowerCase() !== "deck")
        .map(linha => {
          const match = linha.match(/^(\d+)\s+(.+)$/);
          if (!match) return null;

          return {
            quantidadeDesejada: Number(match[1]),
            nome: match[2].trim()
          };
        })
        .filter(Boolean);
    }

    function montarUrlsBusca(nomeCarta) {
      const encoded = encodeURIComponent(nomeCarta);

      return [
        `${BASE_SITE}&nome=${encoded}`,
        `${BASE_SITE}&busca=${encoded}`,
        `${BASE_SITE}&buscar=${encoded}`,
        `${BASE_SITE}&search=${encoded}`,
        `${BASE_SITE}&q=${encoded}`
      ];
    }

    async function fetchComProxy(url) {
      const proxies = [
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];

      for (const proxy of proxies) {
        try {
          const response = await fetch(proxy);
          if (!response.ok) continue;

          const text = await response.text();
          if (text && text.length > 100) return text;
        } catch (error) {}
      }

      return null;
    }

    function extrairPreco(bloco) {
      const texto = bloco.replace(/\s+/g, " ");
      const match = texto.match(/R\$ ?\d{1,3}(?:\.\d{3})*,\d{2}/i);
      return match ? match[0] : "Preço não identificado";
    }

    function temEstoqueZero(bloco) {
      const texto = normalizarTexto(bloco);

      const padroesZero = [
        /\b0\s*unid\b/i,
        /\b0\s*unids\b/i,
        /\b0\s*unidade\b/i,
        /\b0\s*unidades\b/i,
        /\bestoque\s*0\b/i,
        /\bquantidade\s*0\b/i,
        /\bqtd\s*0\b/i
      ];

      const frasesSemEstoque = [
        "sem estoque",
        "fora de estoque",
        "indisponivel",
        "produto indisponivel",
        "esgotado",
        "avise me quando chegar",
        "aviseme quando chegar",
        "produto esgotado"
      ];

      if (padroesZero.some(regex => regex.test(texto))) return true;
      if (frasesSemEstoque.some(frase => texto.includes(frase))) return true;

      return false;
    }

    function extrairQuantidade(bloco) {
      const texto = normalizarTexto(bloco);

      if (temEstoqueZero(bloco)) {
        return 0;
      }

      const padroes = [
        /(\d+)\s*unid\b/i,
        /(\d+)\s*unids\b/i,
        /(\d+)\s*unidade\b/i,
        /(\d+)\s*unidades\b/i,
        /estoque\s*[:\-]?\s*(\d+)/i,
        /quantidade\s*[:\-]?\s*(\d+)/i,
        /qtd\s*[:\-]?\s*(\d+)/i,
        /disponivel\s*[:\-]?\s*(\d+)/i
      ];

      for (const padrao of padroes) {
        const match = texto.match(padrao);

        if (match) {
          const qtd = Number(match[1]);
          return isNaN(qtd) ? 0 : qtd;
        }
      }

      return 0;
    }

    function contemSemResultado(html) {
      const texto = normalizarTexto(html);

      const frases = [
        "nenhum produto encontrado",
        "nenhum resultado encontrado",
        "produto nao encontrado",
        "nao encontramos",
        "sem resultado",
        "0 produtos encontrados"
      ];

      return frases.some(frase => texto.includes(frase));
    }

    function pegarBlocoDaCarta(html, nomeCarta) {
      const nomeNormalizado = normalizarTexto(nomeCarta);
      const htmlNormalizado = normalizarTexto(html);

      if (!htmlNormalizado.includes(nomeNormalizado)) {
        return null;
      }

      const indexOriginal = normalizarTexto(html.substring(0, html.length)).indexOf(nomeNormalizado);

      const posicoesPossiveis = [];

      const regexTitulo = new RegExp(nomeCarta.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "i");
      const matchOriginal = html.match(regexTitulo);

      if (matchOriginal && typeof matchOriginal.index === "number") {
        posicoesPossiveis.push(matchOriginal.index);
      }

      const posicao = posicoesPossiveis.length ? posicoesPossiveis[0] : indexOriginal;

      const inicio = Math.max(0, posicao - 1500);
      const fim = Math.min(html.length, posicao + 2500);

      return html.substring(inicio, fim);
    }

    async function buscarCarta(carta) {
      const urls = montarUrlsBusca(carta.nome);

      for (const url of urls) {
        const html = await fetchComProxy(url);

        if (!html) continue;
        if (contemSemResultado(html)) continue;

        const bloco = pegarBlocoDaCarta(html, carta.nome);

        if (!bloco) continue;

        if (temEstoqueZero(bloco)) {
          continue;
        }

        const quantidade = extrairQuantidade(bloco);

        if (quantidade > 0) {
          return {
            nome: carta.nome,
            quantidadeDesejada: carta.quantidadeDesejada,
            quantidadeSite: quantidade,
            faltam: Math.max(carta.quantidadeDesejada - quantidade, 0),
            preco: extrairPreco(bloco),
            url
          };
        }
      }

      return null;
    }

    async function compararCartas() {
      const input = document.getElementById("deckInput").value;
      const results = document.getElementById("results");
      const summary = document.getElementById("summary");

      results.innerHTML = "";
      summary.innerHTML = "";
      cartasEncontradas = [];

      const cartas = parseDeck(input);

      if (!cartas.length) {
        alert("Cole uma lista válida no formato: 1 Nome da Carta");
        return;
      }

      for (let i = 0; i < cartas.length; i++) {
        const carta = cartas[i];

        summary.innerHTML = `
          <div class="summary">
            Buscando ${i + 1} de ${cartas.length}: ${carta.nome}
          </div>
        `;

        const resultado = await buscarCarta(carta);

        if (resultado) {
          cartasEncontradas.push(resultado);
          renderResultado(resultado);
        }

        await esperar(350);
      }

      summary.innerHTML = `
        <div class="summary">
          Busca finalizada: ${cartasEncontradas.length} carta(s) com estoque maior que zero encontradas.
        </div>
      `;

      if (!cartasEncontradas.length) {
        results.innerHTML = `
          <div class="empty">
            Nenhuma carta da sua lista foi confirmada com estoque maior que zero.
          </div>
        `;
      }
    }

    function renderResultado(carta) {
      const results = document.getElementById("results");

      const html = `
        <div class="card">
          <div class="status">Em estoque confirmado</div>
          <strong>${carta.nome}</strong><br>
          Quantidade desejada: ${carta.quantidadeDesejada}<br>
          Quantidade disponível: ${carta.quantidadeSite}<br>
          Faltam: ${carta.faltam}<br>
          Preço: ${carta.preco}<br><br>
          <a href="${carta.url}" target="_blank">Abrir busca no site</a>
        </div>
      `;

      results.insertAdjacentHTML("beforeend", html);
    }

    function copiarEncontradas() {
      if (!cartasEncontradas.length) {
        alert("Nenhuma carta com estoque maior que zero foi encontrada.");
        return;
      }

      const texto = cartasEncontradas.map(carta => {
        return `${carta.quantidadeDesejada} ${carta.nome} | disponível: ${carta.quantidadeSite} | ${carta.preco}`;
      }).join("\n");

      navigator.clipboard.writeText(texto).then(() => {
        alert("Lista copiada!");
      });
    }

    function limparResultado() {
      document.getElementById("summary").innerHTML = "";
      document.getElementById("results").innerHTML = "";
      cartasEncontradas = [];
    }

    function esperar(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>

</body>
</html>
