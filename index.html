<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comparador Goblin Hero - Magic</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f5;
      margin: 0;
      padding: 20px;
      color: #1d1d1d;
    }

    h1 {
      text-align: center;
      color: #0f5132;
    }

    textarea {
      width: 100%;
      height: 260px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      background: #198754;
      color: white;
      border: none;
      padding: 12px 18px;
      margin: 10px 5px 10px 0;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #146c43;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      border-left: 6px solid #198754;
    }

    .status {
      font-weight: bold;
      color: #198754;
      margin-bottom: 5px;
    }

    .summary {
      background: #e9f7ef;
      border-radius: 10px;
      padding: 15px;
      margin: 15px 0;
      font-weight: bold;
    }

    .empty {
      background: #fff3cd;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      color: #856404;
      font-weight: bold;
    }

    a {
      color: #0d6efd;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Cartas em Estoque - Goblin Hero Store</h1>

  <p>Cole sua lista abaixo:</p>

  <textarea id="deckInput">Deck
1 Desolate Mire
1 Choked Estuary
1 Glacial Fortress

1 Fetid Heath
1 Bojuka Bog

1 Arcane Signet

1 Absorb

1 Unwind

1 Circle of Power

1 Crushing Disappointment
1 Syphon Mind
1 Helm of the Ghastlord
1 Emet-Selch of the Third Seat
1 Y'shtola, Night's Blessed
1 Fandaniel, Telophoroi Ascian
1 Cleansing Nova
1 Starfall Invocation
1 Sublime Epiphany</textarea>

  <br>

  <button onclick="compararCartas()">Buscar somente cartas em estoque</button>
  <button onclick="copiarEncontradas()">Copiar cartas em estoque</button>
  <button onclick="limparResultado()">Limpar resultado</button>

  <div id="summary"></div>
  <div id="results"></div>

  <script>
    const BASE_SITE = "https://www.goblinherostore.com.br/?view=ecom/itens&tcg=1";

    let cartasEncontradas = [];

    function normalizarTexto(texto) {
      return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseDeck(texto) {
      return texto
        .split("\n")
        .map(linha => linha.trim())
        .filter(linha => linha && linha.toLowerCase() !== "deck")
        .map(linha => {
          const match = linha.match(/^(\d+)\s+(.+)$/);
          if (!match) return null;

          return {
            quantidadeDesejada: parseInt(match[1]),
            nome: match[2].trim()
          };
        })
        .filter(Boolean);
    }

    function montarUrlsBusca(nomeCarta) {
      const encoded = encodeURIComponent(nomeCarta);

      return [
        `${BASE_SITE}&buscar=${encoded}`,
        `${BASE_SITE}&busca=${encoded}`,
        `${BASE_SITE}&search=${encoded}`,
        `${BASE_SITE}&q=${encoded}`,
        `${BASE_SITE}&nome=${encoded}`,
        `${BASE_SITE}&produto=${encoded}`
      ];
    }

    function montarUrlManual(nomeCarta) {
      return `${BASE_SITE}&busca=${encodeURIComponent(nomeCarta)}`;
    }

    async function fetchComProxy(url) {
      const proxies = [
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        `https://corsproxy.io/?${encodeURIComponent(url)}`
      ];

      for (const proxy of proxies) {
        try {
          const response = await fetch(proxy);

          if (!response.ok) continue;

          const text = await response.text();

          if (text && text.length > 100) {
            return text;
          }
        } catch (e) {
          continue;
        }
      }

      return null;
    }

    function contemMensagemSemResultado(html) {
      const texto = normalizarTexto(html);

      const frases = [
        "nenhum produto encontrado",
        "nenhum resultado encontrado",
        "produto nao encontrado",
        "nao encontramos",
        "sem resultado",
        "0 produtos",
        "produto indisponivel",
        "indisponivel",
        "fora de estoque",
        "sem estoque",
        "esgotado"
      ];

      return frases.some(frase => texto.includes(frase));
    }

    function extrairPreco(html) {
      const texto = html.replace(/\s+/g, " ");
      const match = texto.match(/R\$ ?\d{1,3}(?:\.\d{3})*,\d{2}/i);
      return match ? match[0] : "Preço não identificado";
    }

    function extrairQuantidade(html) {
      const textoOriginal = html.replace(/\s+/g, " ");
      const texto = normalizarTexto(html);

      const padroes = [
        /quantidade\s*[:\-]?\s*(\d+)/i,
        /estoque\s*[:\-]?\s*(\d+)/i,
        /disponivel\s*[:\-]?\s*(\d+)/i,
        /(\d+)\s*unidades/i,
        /(\d+)\s*unidade/i,
        /qtd\s*[:\-]?\s*(\d+)/i
      ];

      for (const padrao of padroes) {
        const match = texto.match(padrao);
        if (match) {
          const qtd = parseInt(match[1]);
          if (!isNaN(qtd)) return qtd;
        }
      }

      const temComprar = texto.includes("comprar");
      const temAdicionar = texto.includes("adicionar ao carrinho") || texto.includes("adicionar no carrinho");

      if (temComprar || temAdicionar) {
        return 1;
      }

      return 0;
    }

    async function buscarCarta(carta) {
      const nomeNormalizado = normalizarTexto(carta.nome);
      const urls = montarUrlsBusca(carta.nome);

      for (const url of urls) {
        const html = await fetchComProxy(url);

        if (!html) continue;

        const htmlNormalizado = normalizarTexto(html);

        const encontrouNome = htmlNormalizado.includes(nomeNormalizado);
        const semResultado = contemMensagemSemResultado(html);

        if (!encontrouNome || semResultado) continue;

        const quantidadeSite = extrairQuantidade(html);

        if (quantidadeSite > 0) {
          return {
            nome: carta.nome,
            quantidadeDesejada: carta.quantidadeDesejada,
            quantidadeSite,
            faltam: Math.max(carta.quantidadeDesejada - quantidadeSite, 0),
            preco: extrairPreco(html),
            url
          };
        }
      }

      return null;
    }

    async function compararCartas() {
      const input = document.getElementById("deckInput").value;
      const results = document.getElementById("results");
      const summary = document.getElementById("summary");

      results.innerHTML = "";
      summary.innerHTML = "";
      cartasEncontradas = [];

      const cartas = parseDeck(input);

      if (cartas.length === 0) {
        alert("Cole uma lista válida no formato: 1 Nome da Carta");
        return;
      }

      let verificadas = 0;

      for (const carta of cartas) {
        verificadas++;

        summary.innerHTML = `
          <div class="summary">
            Buscando ${verificadas} de ${cartas.length}: ${carta.nome}
          </div>
        `;

        const resultado = await buscarCarta(carta);

        if (resultado) {
          cartasEncontradas.push(resultado);
          renderResultado(resultado);
        }

        await esperar(300);
      }

      if (cartasEncontradas.length === 0) {
        results.innerHTML = `
          <div class="empty">
            Nenhuma carta com estoque confirmado foi encontrada automaticamente.
            <br><br>
            Isso pode acontecer se o site bloquear a leitura automática ou não mostrar estoque no HTML.
          </div>
        `;
      }

      summary.innerHTML = `
        <div class="summary">
          Busca finalizada: ${cartasEncontradas.length} carta(s) com estoque confirmado.
        </div>
      `;
    }

    function renderResultado(carta) {
      const results = document.getElementById("results");

      const html = `
        <div class="card">
          <div class="status">Em estoque confirmado</div>
          <strong>${carta.nome}</strong><br>
          Quantidade desejada: ${carta.quantidadeDesejada}<br>
          Quantidade disponível: ${carta.quantidadeSite}<br>
          Faltam: ${carta.faltam}<br>
          Preço: ${carta.preco}<br><br>
          <a href="${carta.url}" target="_blank">Abrir carta no site</a>
        </div>
      `;

      results.insertAdjacentHTML("beforeend", html);
    }

    function copiarEncontradas() {
      if (cartasEncontradas.length === 0) {
        alert("Nenhuma carta em estoque confirmada ainda.");
        return;
      }

      const texto = cartasEncontradas.map(carta => {
        return `${carta.quantidadeDesejada} ${carta.nome} | disponível: ${carta.quantidadeSite} | ${carta.preco}`;
      }).join("\n");

      navigator.clipboard.writeText(texto).then(() => {
        alert("Lista de cartas em estoque copiada!");
      });
    }

    function limparResultado() {
      document.getElementById("results").innerHTML = "";
      document.getElementById("summary").innerHTML = "";
      cartasEncontradas = [];
    }

    function esperar(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>

</body>
</html>
